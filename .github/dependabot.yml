version: 2
updates:
  # npm dependencies across the workspace
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    versioning-strategy: "increase"
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      type-definitions:
        patterns:
          - "@types/*"
      drizzle:
        patterns:
          - "drizzle-orm*"
      typescript-tooling:
        patterns:
          - "typescript"
          - "tsx"
          - "vitest"
      postgres-clients:
        patterns:
          - "pg"
          - "postgres"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
